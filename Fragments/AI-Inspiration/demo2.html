<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inspector Layout</title>

    <style>
        body {
            margin: 0;
            background: #1e1e1e;
            font-family: Segoe UI, sans-serif;
            color: #ddd;
        }

        /* INSPECTOR PANEL */

        .inspector {
            width: 350px;
            height: 100vh;
            background: #252526;
            border-left: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */

        .inspector-header {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid #3c3c3c;
        }

        /* OBJECT INFO */

        .inspector-object {
            padding: 12px;
            border-bottom: 1px solid #3c3c3c;
        }

        .object-name {
            width: 100%;
            padding: 6px;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: white;
            border-radius: 4px;
        }

        /* COMPONENT */

        .inspector-component {
            border-bottom: 1px solid #3c3c3c;
        }

        /* COMPONENT HEADER */

        .component-header {
            padding: 8px 10px;
            background: #2d2d30;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .component-header:hover {
            background: #343438;
        }

        /* COMPONENT BODY */

        .component-body {
            padding: 8px;
        }

        /* PROPERTY ROW */

        .property {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .property-label {
            width: 120px;
            font-size: 12px;
            color: #bbb;
        }

        /* INPUTS */

        .property input,
        .property select {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: white;
            padding: 4px 6px;
            border-radius: 3px;
            font-size: 12px;
        }

        /* VECTOR FIELDS */

        .vector3 {
            display: flex;
            gap: 4px;
        }

        .vector3 input {
            width: 60px;
        }

        /* TOGGLE */

        .toggle {
            display: flex;
            align-items: center;
        }

        .toggle input {
            width: auto;
        }

        /* ADD COMPONENT BUTTON */

        .add-component {
            margin: 10px;
            padding: 6px;
            background: #3a3a3d;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .add-component:hover {
            background: #4a4a4f;
        }
    </style>
</head>

<body>

    <div class="inspector">

        <div class="inspector-header">
            Inspector
        </div>


        <div class="inspector-object">

            <input class="object-name" value="Player" />

        </div>


        <!-- TRANSFORM COMPONENT -->

        <div class="inspector-component">

            <div class="component-header">
                Transform
            </div>

            <div class="component-body">

                <div class="property">
                    <div class="property-label">Position</div>

                    <div class="vector3">
                        <input type="number" value="0">
                        <input type="number" value="1">
                        <input type="number" value="0">
                    </div>

                </div>


                <div class="property">
                    <div class="property-label">Rotation</div>

                    <div class="vector3">
                        <input type="number" value="0">
                        <input type="number" value="45">
                        <input type="number" value="0">
                    </div>

                </div>


                <div class="property">
                    <div class="property-label">Scale</div>

                    <div class="vector3">
                        <input type="number" value="1">
                        <input type="number" value="1">
                        <input type="number" value="1">
                    </div>

                </div>

            </div>
        </div>


        <!-- RENDERER COMPONENT -->

        <div class="inspector-component">

            <div class="component-header">
                Renderer
            </div>

            <div class="component-body">

                <div class="property">
                    <div class="property-label">Material</div>
                    <select>
                        <option>Default</option>
                        <option>Metal</option>
                        <option>Glass</option>
                    </select>
                </div>


                <div class="property">
                    <div class="property-label">Visible</div>

                    <div class="toggle">
                        <input type="checkbox" checked>
                    </div>

                </div>

            </div>
        </div>


        <!-- PLAYER STATS COMPONENT -->

        <div class="inspector-component">

            <div class="component-header">
                Player Stats
            </div>

            <div class="component-body">

                <div class="property">
                    <div class="property-label">Health</div>
                    <input type="number" value="100">
                </div>


                <div class="property">
                    <div class="property-label">Speed</div>
                    <input type="number" value="5.5">
                </div>


                <div class="property">
                    <div class="property-label">Class</div>
                    <select>
                        <option>Warrior</option>
                        <option>Mage</option>
                        <option>Ranger</option>
                    </select>
                </div>

            </div>

        </div>


        <button class="add-component">
            + Add Component
        </button>

    </div>

</body>

</html>
