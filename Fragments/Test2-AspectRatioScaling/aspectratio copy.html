<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centered Scaled App</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070b14;
      font-family: "Segoe UI", sans-serif;
    }

    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, #09101d 0%, #050913 100%);
    }

    /* This is the element we move + scale */
    .scaler {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
    }

    /* Fixed-size app canvas */
    .app {
      width: 960px;
      height: 540px;

      display: grid;
      grid-template-columns: 200px 1fr 200px;
      grid-template-rows: 64px 1fr 32px;
      grid-template-areas:
        "topbar topbar topbar"
        "sidebar workspace inspector"
        "status status status";

      background: #151b26;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      color: #dbe6ff;
    }

    .topbar {
      grid-area: topbar;
      background: #232b39;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 22px;
    }

    .sidebar {
      grid-area: sidebar;
      background: #161d29;
      padding: 20px;
      font-size: 18px;
    }

    .workspace {
      grid-area: workspace;
      background: #0f1520;
      padding: 20px;
      font-size: 18px;
    }

    .inspector {
      grid-area: inspector;
      background: #161d29;
      padding: 20px;
      font-size: 18px;
    }

    .status {
      grid-area: status;
      background: #232b39;
      padding: 6px 16px;
      font-size: 14px;
      color: #a9b7d3;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="scaler" id="scaler">
      <div class="app">
        <div class="topbar">StreamDeck Studio</div>
        <div class="sidebar">Sidebar</div>
        <div class="workspace">Workspace</div>
        <div class="inspector">Inspector</div>
        <div class="status">Ready</div>
      </div>
    </div>
  </div>

  <script>
    const baseWidth = 960;
    const baseHeight = 540;

    function scaleUI() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const scale = Math.min(vw / baseWidth, vh / baseHeight);

      const scaler = document.getElementById("scaler");
      scaler.style.width = baseWidth + "px";
      scaler.style.height = baseHeight + "px";
      scaler.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    window.addEventListener("resize", scaleUI);
    scaleUI();
  </script>
</body>
</html>
